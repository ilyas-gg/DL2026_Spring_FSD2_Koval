version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: weather_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weather_memes
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: weather_cache
    ports:
      - "6379:6379"